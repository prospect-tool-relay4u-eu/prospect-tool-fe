name: Publish Docker image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/prospect-tool-relay4u-eu/relay4u-fe

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build --build-arg BUILD_CONFIG=sandbox -t "${{ env.IMAGE_NAME }}:${{ github.ref_name }}" -t "${{ env.IMAGE_NAME }}:latest" .
          docker push "${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          docker push "${{ env.IMAGE_NAME }}:latest"
